name: RSS Digest

on:
  schedule:
    # Каждые 6 часов (00:00, 06:00, 12:00, 18:00 UTC).
    # cron в GitHub Actions всегда в UTC.
    - cron: "0 9 * * *"
  workflow_dispatch: {}  # ручной запуск из вкладки Actions

permissions:
  contents: write  # нужно, чтобы Action мог пушить коммиты

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install feedparser

      - name: Update digest
        id: digest
        run: python update_digest.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add DIGEST.md seen.json
            git commit -m "chore(rss): обновление дайджеста $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "Изменений нет — пропускаю коммит."
          fi
